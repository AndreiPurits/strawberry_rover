<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Rover Web Dashboard</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: sans-serif;
      background: #111;
      color: #e7e7e7;
    }
    .app-shell {
      width: 100vw;
      height: 100vh;
      padding: 10px;
      display: grid;
      grid-template-columns: 58% 42%;
      gap: 10px;
    }
    .card {
      background: #1b1b1b;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 8px;
      min-height: 0;
      overflow: hidden;
    }
    .left-pane {
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 8px;
      min-height: 0;
    }
    .right-pane {
      display: grid;
      grid-template-rows: 1fr 1fr 1fr auto;
      gap: 8px;
      min-height: 0;
    }
    h2, h3, h4 { margin: 0 0 6px 0; }
    .layer-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      font-size: 12px;
      align-items: center;
    }
    #fieldCanvas {
      width: 100%;
      height: 100%;
      background: #202020;
      border: 1px solid #444;
      border-radius: 6px;
      display: block;
    }
    .field-wrap {
      min-height: 0;
      display: flex;
      flex-direction: column;
    }
    .field-canvas-wrap {
      flex: 1;
      min-height: 0;
    }
    .cam-card {
      display: grid;
      grid-template-rows: auto 1fr;
      min-height: 0;
    }
    canvas.cam {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
      border: 1px solid #333;
      border-radius: 6px;
      display: block;
    }
    .status-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      font-size: 12px;
      line-height: 1.3;
    }
    .control-groups {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }
    .group-title {
      font-size: 12px;
      opacity: 0.85;
      margin-bottom: 4px;
    }
    .button-grid {
      display: grid;
      gap: 6px;
    }
    button {
      min-height: 40px;
      font-size: 14px;
      font-weight: 600;
      border-radius: 8px;
      border: 1px solid #555;
      background: #2a2a2a;
      color: #ececec;
      cursor: pointer;
    }
    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }
    button.active {
      border-color: #77c9ff;
      box-shadow: 0 0 0 2px rgba(119, 201, 255, 0.25);
      background: #2f3d4a;
    }
    .kv { font-size: 12px; line-height: 1.35; }
    .badge {
      display: inline-block;
      padding: 3px 7px;
      border-radius: 12px;
      font-size: 11px;
      border: 1px solid #555;
      margin-right: 4px;
    }
    .mode-manual { background: rgba(80, 130, 255, 0.25); color: #dbe7ff; }
    .mode-auto { background: rgba(120, 120, 120, 0.25); color: #f0f0f0; }
    .status-running { color: #9dffb2; }
    .status-stopped { color: #ffacac; }
    .recording-on { color: #ff6b6b; font-weight: 700; }
    .recording-off { color: #8f8f8f; }
  </style>
</head>
<body>
  <div class="app-shell">
    <section class="left-pane">
      <div class="card">
        <h2>Strawberry Rover Dashboard</h2>
        <div class="layer-row">
          <label><input type="checkbox" id="layerSensors" checked> Sensor</label>
          <label><input type="checkbox" id="layerAnalytics" checked> Analytics</label>
          <label><input type="checkbox" id="layerTrail" checked> Trail</label>
          <span id="routeRecordStatus" class="recording-off">Recording: idle</span>
        </div>
      </div>
      <div class="card field-wrap">
        <div class="field-canvas-wrap">
          <canvas id="fieldCanvas" width="1100" height="760"></canvas>
        </div>
      </div>
      <div class="card kv" id="fieldStats"></div>
    </section>

    <section class="right-pane">
      <div class="card cam-card">
        <h4>Front Camera</h4>
        <canvas id="camFront" class="cam" width="640" height="480"></canvas>
      </div>
      <div class="card cam-card">
        <h4>Bottom Camera</h4>
        <canvas id="camBottom" class="cam" width="640" height="480"></canvas>
      </div>
      <div class="card cam-card">
        <h4>Stereo (combined)</h4>
        <canvas id="camStereo" class="cam" width="640" height="480"></canvas>
      </div>
      <div class="card">
        <div class="control-groups">
          <div>
            <div class="group-title">Mode + Motion</div>
            <div class="button-grid">
              <button id="btnModeToggle">Switch to Manual</button>
              <button id="btnStart">Start</button>
              <button id="btnStop">Stop</button>
            </div>
          </div>
          <div>
            <div class="group-title">Route Recording</div>
            <div class="button-grid">
              <button id="btnRouteStart">Start Recording</button>
              <button id="btnRouteStop">Stop Recording</button>
              <button id="btnRouteSave">Save Route</button>
            </div>
          </div>
          <div class="status-grid">
            <div class="kv" id="controlStatus">Mode: auto | Status: stopped</div>
            <div class="kv" id="controlSource">Control source: n/a</div>
            <div class="kv" id="gamepadStatus">Gamepad: disconnected</div>
            <div class="kv" id="scanPanel">LiDAR: waiting...</div>
          </div>
        </div>
        <div class="kv" style="margin-top: 8px;">
          Keyboard: W/S/A/D + Space
        </div>
        <div class="kv" id="routeStats" style="margin-top: 6px;">Routes: 0 saved</div>
        <div class="kv" id="telemetryPanel" style="margin-top: 6px;">Waiting for data...</div>
      </div>
    </section>
  </div>

  <script src="/static/dashboard.js"></script>
</body>
</html>
