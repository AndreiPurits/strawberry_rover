/**:
  ros__parameters:
    device_index: 4
    frame_id: "stereo_camera_link"
    fps: 12.0
    width: 640
    height: 480
    use_v4l2_backend: true
    image_topic: "/stereo_camera/image_raw"
    camera_info_topic: "/stereo_camera/camera_info"
    debug_image_topic: "/stereo_camera/debug/image_annotated"
    publish_camera_info: false
    publish_debug_image: false
    camera_name: "realsense_stereo"
    auto_reconnect: true
    flip_horizontal: false
    # RealSense D405 UVC: brightness (-64..64) + gamma (100..500).
    auto_exposure: true
    exposure: -1
    gain: -1
    brightness: -20
    gamma: 280
    auto_brightness_enable: true
    auto_brightness_min: 110.0
    auto_brightness_max: 150.0
    auto_brightness_trial_interval_sec: 3.0
    auto_brightness_exclude_claws: true
    auto_brightness_exclude_dark_threshold: 55
    auto_brightness_exclude_bottom_frac: 0.58
    auto_brightness_exclude_min_claw_area: 1200.0
    auto_brightness_mask_file: "~/.config/axm/stereo_brightness_exclude.json"
    auto_brightness_relearn_mask: false
    tuning_topic: "/stereo_camera/tuning"
