<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dataset Curation UI</title>
    <style>
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, sans-serif; margin: 16px; }
      .row { display: flex; gap: 16px; flex-wrap: wrap; align-items: center; }
      .card { border: 1px solid #ddd; border-radius: 10px; padding: 12px; max-width: 1100px; }
      img { max-width: min(100%, 1000px); max-height: 70vh; border-radius: 8px; border: 1px solid #eee; }
      button { padding: 10px 14px; border-radius: 10px; border: 1px solid #ccc; cursor: pointer; background: #fff; }
      button.primary { border-color: #1a73e8; }
      button.danger { border-color: #d93025; }
      button.ask { border-color: #5f6368; }
      .meta { color: #444; font-size: 14px; }
      .status { margin-top: 8px; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; font-size: 12px; white-space: pre-wrap; }
      select, input { padding: 8px; border-radius: 10px; border: 1px solid #ccc; }
      .sep { height: 1px; background: #eee; margin: 12px 0; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="meta">
        Этот файл — статический каркас (исторический артефакт).
        Актуальный “железобетонный” UI рендерится на сервере (Flask) в `scripts/curation_ui.py`
        и работает без JS (кроме overlay bbox и клика по bbox).
      </div>
    </div>
  </body>
</html>
