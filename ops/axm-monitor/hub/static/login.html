<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AXM Monitor — вход</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body class="auth-page">
  <main class="card auth-card">
    <h1>AXM Monitor</h1>
    <p class="muted">Мониторинг роверов axm.tech</p>
    <p class="muted tiny">Введите своё имя — оно будет видно другим операторам</p>
    <form id="login-form" method="post" action="/api/login" autocomplete="on">
      <label>
        Логин
        <input id="username" name="username" type="text" autocomplete="username" required />
      </label>
      <label>
        Пароль
        <input id="password" name="password" type="password" autocomplete="current-password" required />
      </label>
      <label class="remember-row">
        <input id="remember" name="remember" type="checkbox" checked />
        Запомнить меня (30 дней)
      </label>
      <button type="submit">Войти</button>
      <p id="error" class="error hidden"></p>
    </form>
  </main>
  <script>
    const USER_KEY = "axm_saved_username";
    const userEl = document.getElementById("username");
    const saved = localStorage.getItem(USER_KEY);
    if (saved) userEl.value = saved;

    document.getElementById("login-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const fd = new FormData(e.target);
      const err = document.getElementById("error");
      err.classList.add("hidden");
      const username = String(fd.get("username") || "");
      const res = await fetch("/api/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        credentials: "same-origin",
        body: JSON.stringify({
          username,
          password: fd.get("password"),
          remember: document.getElementById("remember").checked,
        }),
      });
      if (!res.ok) {
        err.textContent = "Неверный логин или пароль";
        err.classList.remove("hidden");
        return;
      }
      const data = await res.json().catch(() => ({}));
      const name = data.username || username;
      localStorage.setItem(USER_KEY, name);
      const next = new URLSearchParams(location.search).get("next") || "/";
      location.href = next.startsWith("/") && !next.startsWith("//") ? next : "/";
    });
  </script>
</body>
</html>
