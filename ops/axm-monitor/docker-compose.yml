services:
  hub:
    build:
      context: ./hub
    container_name: axm-monitor-hub
    restart: unless-stopped
    env_file:
      - .env
    environment:
      AXM_COOKIE_SECURE: "true"
    ports:
      - "127.0.0.1:8090:8090"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8090/healthz')"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - axm

  # Use only on a clean VPS without an existing reverse proxy on :80/:443
  nginx:
    profiles: ["nginx-edge"]
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - hub
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/active.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-www:/var/www/certbot:ro
      - certbot-conf:/etc/letsencrypt:ro
    networks:
      - axm

  certbot:
    profiles: ["nginx-edge"]
    image: certbot/certbot:latest
    volumes:
      - certbot-www:/var/www/certbot
      - certbot-conf:/etc/letsencrypt
    entrypoint: /bin/sh
    command: -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot; sleep 12h; done"

volumes:
  certbot-www:
  certbot-conf:

networks:
  axm:
